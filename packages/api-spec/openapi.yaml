openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SchulSaniApp API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: missions
    description: Mission management
  - name: duty
    description: Duty roster
  - name: loa
    description: Leave of absence
  - name: news
    description: News feed
  - name: users
    description: User management
  - name: roles
    description: Custom role management
  - name: push
    description: Push notifications
  - name: activity
    description: Activity log

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    CustomRole:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        permissions:
          type: array
          items:
            type: string
        createdBy:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - color
        - permissions
        - createdBy
        - createdAt

    User:
      type: object
      properties:
        id:
          type: string
        iservUsername:
          type: string
        displayName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, sanitaeter_leitung_admin, sanitaeter_leitung, teacher, sanitaeter]
        customRoleId:
          type: string
          nullable: true
        customRole:
          $ref: "#/components/schemas/CustomRole"
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - iservUsername
        - displayName
        - email
        - role
        - isActive
        - createdAt

    MissionResponder:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
        respondedAt:
          type: string
      required:
        - id
        - userId
        - displayName
        - respondedAt

    Mission:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        location:
          type: string
        patientInitials:
          type: string
        treatmentNotes:
          type: string
        status:
          type: string
          enum: [active, closed]
        createdBy:
          type: string
        createdByName:
          type: string
        createdAt:
          type: string
        closedAt:
          type: string
          nullable: true
        responders:
          type: array
          items:
            $ref: "#/components/schemas/MissionResponder"
      required:
        - id
        - title
        - location
        - patientInitials
        - treatmentNotes
        - status
        - createdBy
        - createdByName
        - createdAt
        - responders

    CreateMissionRequest:
      type: object
      properties:
        title:
          type: string
        location:
          type: string
        patientInitials:
          type: string
        treatmentNotes:
          type: string
      required:
        - title
        - location
        - patientInitials

    UpdateMissionRequest:
      type: object
      properties:
        title:
          type: string
        location:
          type: string
        patientInitials:
          type: string
        treatmentNotes:
          type: string

    DutySlot:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - userId
        - displayName
        - date
        - startTime
        - endTime
        - createdAt

    CreateDutySlotRequest:
      type: object
      properties:
        userId:
          type: string
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string
      required:
        - userId
        - date
        - startTime
        - endTime

    DutyEntry:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        dutySlotId:
          type: string
        date:
          type: string
        enteredAt:
          type: string
        confirmedAt:
          type: string
          nullable: true
      required:
        - id
        - userId
        - dutySlotId
        - date
        - enteredAt

    DutyTodayResponse:
      type: object
      properties:
        slot:
          $ref: "#/components/schemas/DutySlot"
          nullable: true
        entry:
          $ref: "#/components/schemas/DutyEntry"
          nullable: true
      required:
        - slot
        - entry

    DutyEntryWithUser:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
          nullable: true
        dutySlotId:
          type: string
        date:
          type: string
        enteredAt:
          type: string
        confirmedAt:
          type: string
          nullable: true
      required:
        - id
        - userId
        - dutySlotId
        - date
        - enteredAt

    ActivityLogEntry:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        action:
          type: string
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
      required:
        - id
        - action
        - createdAt

    LoaRequest:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
        reason:
          type: string
        fromDate:
          type: string
        toDate:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewedBy:
          type: string
          nullable: true
        reviewedByName:
          type: string
          nullable: true
        reviewedAt:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - userId
        - displayName
        - reason
        - fromDate
        - toDate
        - status
        - createdAt

    CreateLoaRequest:
      type: object
      properties:
        reason:
          type: string
        fromDate:
          type: string
        toDate:
          type: string
      required:
        - reason
        - fromDate
        - toDate

    UpdateLoaRequest:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
      required:
        - status

    NewsPost:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        authorName:
          type: string
        title:
          type: string
        content:
          type: string
        isPinned:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - authorId
        - authorName
        - title
        - content
        - isPinned
        - createdAt

    CreateNewsRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        isPinned:
          type: boolean
      required:
        - title
        - content

    UpdateNewsRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        isPinned:
          type: boolean

    UpdateUserRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, sanitaeter_leitung_admin, sanitaeter_leitung, teacher, sanitaeter]
        isActive:
          type: boolean
        customRoleId:
          type: string
          nullable: true

    CreateCustomRoleRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        permissions:
          type: array
          items:
            type: string
      required:
        - name
        - permissions

    UpdateCustomRoleRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        permissions:
          type: array
          items:
            type: string

    PushTokenRequest:
      type: object
      properties:
        token:
          type: string
        platform:
          type: string
          enum: [ios, android]
      required:
        - token
        - platform

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with IServ credentials
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /missions:
    get:
      operationId: getMissions
      tags: [missions]
      summary: List missions
      responses:
        "200":
          description: List of missions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mission"
    post:
      operationId: createMission
      tags: [missions]
      summary: Create mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMissionRequest"
      responses:
        "201":
          description: Mission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

  /missions/{id}:
    get:
      operationId: getMission
      tags: [missions]
      summary: Get mission by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
    patch:
      operationId: updateMission
      tags: [missions]
      summary: Update mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMissionRequest"
      responses:
        "200":
          description: Mission updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

  /missions/{id}/close:
    post:
      operationId: closeMission
      tags: [missions]
      summary: Close a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mission closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

  /missions/{id}/respond:
    post:
      operationId: respondToMission
      tags: [missions]
      summary: Respond to a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

  /duty:
    get:
      operationId: getDutySlots
      tags: [duty]
      summary: List duty slots
      responses:
        "200":
          description: List of duty slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DutySlot"
    post:
      operationId: createDutySlot
      tags: [duty]
      summary: Create duty slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDutySlotRequest"
      responses:
        "201":
          description: Duty slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DutySlot"

  /duty/{id}:
    delete:
      operationId: deleteDutySlot
      tags: [duty]
      summary: Delete duty slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /duty/today:
    get:
      operationId: getDutyToday
      tags: [duty]
      summary: Get current user's duty slot and entry for today
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Today's duty status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DutyTodayResponse"

  /duty/enter:
    post:
      operationId: enterDuty
      tags: [duty]
      summary: Enter duty for today
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Duty entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DutyEntry"
        "403":
          description: No duty slot today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already entered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /duty/confirm:
    post:
      operationId: confirmDuty
      tags: [duty]
      summary: Confirm daily attendance
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Confirmation recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DutyEntry"
        "404":
          description: No entry today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /duty/entries:
    get:
      operationId: getDutyEntries
      tags: [duty]
      summary: List all duty entries (managers only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of duty entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DutyEntryWithUser"

  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get activity log
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogEntry"

  /loa:
    get:
      operationId: getLoaRequests
      tags: [loa]
      summary: List LOA requests
      responses:
        "200":
          description: List of LOA requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoaRequest"
    post:
      operationId: createLoaRequest
      tags: [loa]
      summary: Create LOA request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoaRequest"
      responses:
        "201":
          description: LOA request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoaRequest"

  /loa/{id}:
    patch:
      operationId: updateLoaRequest
      tags: [loa]
      summary: Approve or reject LOA request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoaRequest"
      responses:
        "200":
          description: LOA updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoaRequest"

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: List news posts
      responses:
        "200":
          description: List of news posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsPost"
    post:
      operationId: createNews
      tags: [news]
      summary: Create news post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsRequest"
      responses:
        "201":
          description: News post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"

  /news/{id}:
    patch:
      operationId: updateNews
      tags: [news]
      summary: Update news post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNewsRequest"
      responses:
        "200":
          description: News updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
    delete:
      operationId: deleteNews
      tags: [news]
      summary: Delete news post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user role/status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /custom-roles:
    get:
      operationId: getCustomRoles
      tags: [roles]
      summary: List custom roles
      responses:
        "200":
          description: List of custom roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomRole"
    post:
      operationId: createCustomRole
      tags: [roles]
      summary: Create custom role (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomRoleRequest"
      responses:
        "201":
          description: Custom role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomRole"

  /custom-roles/{id}:
    patch:
      operationId: updateCustomRole
      tags: [roles]
      summary: Update custom role (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomRoleRequest"
      responses:
        "200":
          description: Custom role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomRole"
    delete:
      operationId: deleteCustomRole
      tags: [roles]
      summary: Delete custom role (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /push-tokens:
    post:
      operationId: registerPushToken
      tags: [push]
      summary: Register push token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenRequest"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
